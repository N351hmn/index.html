<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily To-Do List</title>
    <style>
      body {
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif, sans-serif;
        background-image: url('istockphoto-1198784356-612x612.jpg' );
        background-size: auto;
        margin: auto;
        padding: 20px;
      }
      h1 {
        color: #333;
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }
      p {
        color: #333;
        display: flex;
        justify-content: center;
        margin-top: 10px;
      }
      .container {
        background-image: url('cartoon-note-paper-with-clip-vector-31206723.avif');
        background-color: #e0d56b;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 2px 4px 0;
        margin: 5px auto;
        max-width: 400px;
        position:relative;
        width: 30vw;
        height: 90vh;
      }
      .tack-list {
        margin-bottom: 20px;
      }
      input[type="text"] {
        width: 85%;
        padding: 10px;
        margin-top: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        color: rgb(88, 20, 20);
        font-weight: bold;
        position: absolute;
        top: 110px;
        left: 50%;
        transform: translateX(-50%);
      }
      #add-task-btn {
        background-color: #99438e;
        color: #f3be2e;
        font-weight: bold;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        position:absolute;
        bottom: 10px;
        left: 50%;
        padding: 15px 25px;
        margin-top: 40px;
        transform: translateX(-50%);
      }
      #add-task-btn:hover {
        background-color: #b657b1;
      }
      .message {
        color: red;
        font-weight: bold;
      }
    </style>
</head>
<body>
    <div class="container">
  <h1>My Daily To-Do List</h1>
  <p>It`s the day of all your big dreams!</p>
    <br>
      <div class="tack-list">
        <label for="tasks">
          <input type="text" id="task-input" placeholder="Brush my teeth.. etc">
        </label>
      </div>
      <button id="add-task-btn" onclick="addtask()">Add Task</button>
      <div class="message"></div>
    </div>
    <script>
      var count = 0;
      var maxTasks = 10;
        function addtask() {
          if (count < maxTasks) {
            var addtaskBtn = document.getElementById("add-task-btn");
            
          }
        }

    </script>
</body>
</html>
